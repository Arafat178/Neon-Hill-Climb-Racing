<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Hill Climb</title>
    <style>
        /* === STYLING & UI === */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #080808;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
        }

        /* Heads Up Display Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            pointer-events: none;
        }

        #stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Neon Fuel Bar */
        #fuelContainer {
            width: 250px;
            height: 20px;
            background: #222;
            border-radius: 10px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 10px #00ffcc;
            overflow: hidden;
            position: relative;
        }

        #fuelBar {
            width: 100%;
            height: 100%;
            background: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            transition: width 0.1s linear, background-color 0.3s;
        }

        #fuelText {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            line-height: 20px;
            text-shadow: 1px 1px 2px #000;
        }

        .neon-text {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #00ffcc;
        }

        /* Controls hint */
        #controlsHint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            pointer-events: none;
        }

        /* Game Over Screen */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: none; /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        #gameOverScreen h1 {
            font-size: 72px;
            color: #ff0055;
            text-shadow: 0 0 25px #ff0055;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #reason {
            font-size: 28px;
            color: #ccc;
            margin-bottom: 40px;
        }

        button {
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4), inset 0 0 15px rgba(0, 255, 204, 0.2);
            transition: all 0.3s ease;
        }

        button:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 25px #00ffcc;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="stats">
            <div id="fuelContainer">
                <div id="fuelBar"></div>
                <div id="fuelText">FUEL</div>
            </div>
            <div id="distance" class="neon-text">Distance: 0m</div>
        </div>
        <div id="score" class="neon-text">Pickups: 0</div>
    </div>

    <div id="controlsHint">Use [UP] to Accelerate / Backflip | [DOWN] to Brake / Frontflip</div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p id="reason">You ran out of fuel!</p>
        <button onclick="restartGame()">TRY AGAIN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // === GAME SETUP ===
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const fuelBar = document.getElementById('fuelBar');
        const distanceEl = document.getElementById('distance');
        const scoreEl = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const reasonEl = document.getElementById('reason');

        // Resize handling
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Input state
        let keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Global Game State
        let state = 'playing'; // 'playing', 'gameover'
        let cameraX = 0;
        let cameraY = 0;
        let maxDistance = 0;
        let pickupsCollected = 0;
        let gameOverReason = "";

        // === PHYSICS CLASSES ===

        // Verlet Particle (Used for wheels)
        class Particle {
            constructor(x, y, radius) {
                this.x = x;
                this.y = y;
                this.oldX = x;
                this.oldY = y;
                this.radius = radius;
            }

            integrate(gravity, friction) {
                let vx = (this.x - this.oldX) * friction;
                let vy = (this.y - this.oldY) * friction;
                this.oldX = this.x;
                this.oldY = this.y;
                this.x += vx;
                this.y += vy + gravity;
            }

            constrain(terrain) {
                let groundY = terrain.getHeight(this.x);
                let isGrounded = false;

                if (this.y + this.radius > groundY) {
                    this.y = groundY - this.radius;
                    // Apply ground friction and slight bounce dampening
                    let vx = this.x - this.oldX;
                    let vy = this.y - this.oldY;
                    
                    this.oldX = this.x - vx * 0.95; // Ground friction slows X
                    if (vy > 0) this.oldY = this.y + vy * 0.3; // Dampen bounce
                    
                    isGrounded = true;
                }
                return isGrounded;
            }
        }

        // The Car (Rigid body composed of two wheels and a distance constraint)
        class Car {
            constructor(x, y) {
                this.wheelBase = 70;
                this.wheelRadius = 16;
                
                // Two wheels
                this.p1 = new Particle(x - this.wheelBase / 2, y, this.wheelRadius); // Rear
                this.p2 = new Particle(x + this.wheelBase / 2, y, this.wheelRadius); // Front
                
                this.fuel = 100;
                this.dead = false;
            }

            update(terrain) {
                if (this.dead) return;

                // 1. Integrate physics (Gravity and Air Friction)
                this.p1.integrate(0.6, 0.995);
                this.p2.integrate(0.6, 0.995);

                // 2. Satisfy Distance Constraint (Keep wheels attached to car body)
                for (let i = 0; i < 3; i++) {
                    let dx = this.p2.x - this.p1.x;
                    let dy = this.p2.y - this.p1.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let diff = this.wheelBase - dist;
                    let percent = diff / dist / 2;
                    let offsetX = dx * percent;
                    let offsetY = dy * percent;

                    this.p1.x -= offsetX;
                    this.p1.y -= offsetY;
                    this.p2.x += offsetX;
                    this.p2.y += offsetY;

                    // 3. Terrain Collisions
                    this.grounded1 = this.p1.constrain(terrain);
                    this.grounded2 = this.p2.constrain(terrain);
                }

                // Center of mass and angle
                this.cx = (this.p1.x + this.p2.x) / 2;
                this.cy = (this.p1.y + this.p2.y) / 2;
                let dx = this.p2.x - this.p1.x;
                let dy = this.p2.y - this.p1.y;
                this.angle = Math.atan2(dy, dx);

                // Constant fuel drain
                this.fuel -= 0.03;

                // 4. Input & Motor Logic
                if (this.fuel > 0) {
                    let power = 0;
                    if (keys['ArrowUp']) power = 1.3;
                    if (keys['ArrowDown']) power = -0.9; // Braking/Reverse

                    if (power !== 0) {
                        this.fuel -= 0.05; // Extra drain when driving

                        if (this.grounded1 || this.grounded2) {
                            // Apply force along the angle of the car
                            let fx = Math.cos(this.angle) * power;
                            let fy = Math.sin(this.angle) * power;
                            this.p1.x += fx; this.p1.y += fy;
                            this.p2.x += fx; this.p2.y += fy;
                        } else {
                            // Airborne Rotation (Torque)
                            let torque = power * 0.04; 
                            this.angle += torque;

                            // Reposition wheels based on new angle around center
                            this.p1.x = this.cx - Math.cos(this.angle) * (this.wheelBase / 2);
                            this.p1.y = this.cy - Math.sin(this.angle) * (this.wheelBase / 2);
                            this.p2.x = this.cx + Math.cos(this.angle) * (this.wheelBase / 2);
                            this.p2.y = this.cy + Math.sin(this.angle) * (this.wheelBase / 2);
                        }
                    }
                }

                // 5. Flip Detection
                // Calculate the normal pointing "UP" from the roof
                let nx = dy / this.wheelBase;
                let ny = -dx / this.wheelBase;
                let roofX = this.cx + nx * 30; // 30px above center
                let roofY = this.cy + ny * 30;

                // If roof is below terrain, game over
                if (roofY > terrain.getHeight(roofX) - 5) {
                    this.die("You flipped the car!");
                }

                if (this.fuel <= 0 && !this.dead) {
                    this.die("Out of fuel!");
                }
            }

            die(reason) {
                this.dead = true;
                this.fuel = 0;
                gameOverReason = reason;
                state = 'gameover';
                
                reasonEl.innerText = gameOverReason;
                gameOverScreen.style.display = 'flex';
                keys = {}; // Clear inputs
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.cx, this.cy);
                ctx.rotate(this.angle);

                // --- Car Body (Neon Theme) ---
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff0055';
                ctx.fillStyle = '#ff0055';
                
                // Chassis
                ctx.beginPath();
                ctx.roundRect(-45, -20, 90, 25, 8);
                ctx.fill();

                // Cockpit
                ctx.fillStyle = '#111';
                ctx.shadowColor = '#00ffcc';
                ctx.beginPath();
                ctx.roundRect(-20, -45, 50, 25, 10);
                ctx.fill();

                // Neon trim on cockpit
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Headlight Beam
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(0, 255, 204, 0.15)';
                ctx.beginPath();
                ctx.moveTo(40, -10);
                ctx.lineTo(300, -80);
                ctx.lineTo(300, 80);
                ctx.fill();

                ctx.restore();

                // --- Wheels ---
                this.drawWheel(ctx, this.p1);
                this.drawWheel(ctx, this.p2);
            }

            drawWheel(ctx, p) {
                ctx.save();
                ctx.translate(p.x, p.y);
                
                // Fake rotation based on X position to make rims spin
                let spin = p.x * 0.1; 
                ctx.rotate(spin);

                // Tire
                ctx.fillStyle = '#111';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ffcc';
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 4;
                
                ctx.beginPath();
                ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // Rims
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-p.radius, 0); ctx.lineTo(p.radius, 0);
                ctx.moveTo(0, -p.radius); ctx.lineTo(0, p.radius);
                ctx.stroke();

                ctx.restore();
            }
        }

        // Terrain Generator (Procedural Sine Waves)
        class Terrain {
            constructor() {
                this.seed = Math.random() * 10000;
            }

            getHeight(x) {
                let nx = x * 0.002;
                let y = 0;
                // Combine multiple sine waves for organic hills
                y += Math.sin(nx + this.seed) * 200;
                y += Math.sin(nx * 2.3 + this.seed) * 100;
                y += Math.sin(nx * 5.1 + this.seed) * 40;
                y += Math.sin(nx * 10.5 + this.seed) * 15;
                
                return 400 - y; // Base altitude
            }

            draw(ctx, camX, screenW, screenH) {
                let startX = camX - screenW / 2 - 50;
                let endX = camX + screenW / 2 + 50;

                ctx.fillStyle = '#0a0a0a';
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffcc';

                ctx.beginPath();
                ctx.moveTo(startX, screenH + 500); // Start bottom left

                for (let x = startX; x <= endX; x += 20) {
                    ctx.lineTo(x, this.getHeight(x));
                }

                ctx.lineTo(endX, screenH + 500); // End bottom right
                ctx.fill();
                ctx.stroke();
                
                ctx.shadowBlur = 0; // Reset
            }
        }

        // Fuel Pickup Item
        class Pickup {
            constructor(x, terrain) {
                this.x = x;
                this.y = terrain.getHeight(x) - 40; // Hover above ground
                this.collected = false;
                this.bobOffset = Math.random() * Math.PI * 2;
            }

            update(car) {
                if (this.collected) return;

                // Collision with car (distance check)
                let dx = this.x - car.cx;
                let dy = this.y - car.cy;
                if (dx * dx + dy * dy < 3000) { // ~55px radius
                    this.collected = true;
                    car.fuel = Math.min(100, car.fuel + 35); // Refill fuel
                    pickupsCollected++;
                }
            }

            draw(ctx, time) {
                if (this.collected) return;

                let bobY = this.y + Math.sin(time * 0.005 + this.bobOffset) * 10;

                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffeb3b';
                ctx.fillStyle = '#ffeb3b';
                
                ctx.beginPath();
                ctx.arc(this.x, bobY, 12, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', this.x, bobY);
                
                ctx.shadowBlur = 0;
            }
        }

        // === GAME LOOP & LOGIC ===

        let terrain, car;
        let pickups = []; // Array of active fuel pickups
        let lastChunk = -1;
        let time = 0;

        function restartGame() {
            terrain = new Terrain();
            
            let startX = 0;
            let startY = terrain.getHeight(startX) - 100;
            
            car = new Car(startX, startY);
            pickups = [];
            lastChunk = -1;
            
            maxDistance = 0;
            pickupsCollected = 0;
            cameraX = 0;
            cameraY = 0;
            state = 'playing';
            
            gameOverScreen.style.display = 'none';
        }

        function spawnPickups() {
            let chunk = Math.floor(car.cx / 600); // Check every 600px
            if (chunk > lastChunk) {
                lastChunk = chunk;
                // Spawn 1-2 items per chunk
                let numItems = Math.random() > 0.5 ? 2 : 1;
                for (let i = 0; i < numItems; i++) {
                    let spawnX = chunk * 600 + Math.random() * 500 + 300; // Ahead of car
                    pickups.push(new Pickup(spawnX, terrain));
                }

                // Clean up old pickups to prevent memory leaks
                pickups = pickups.filter(p => p.x > car.cx - window.innerWidth);
            }
        }

        function updateUI() {
            // Fuel Bar
            let fuelPct = Math.max(0, car.fuel);
            fuelBar.style.width = fuelPct + '%';
            
            // Color Shift (Green > Yellow > Red)
            if (fuelPct < 20) {
                fuelBar.style.backgroundColor = '#ff0055';
                fuelBar.style.boxShadow = '0 0 15px #ff0055';
            } else if (fuelPct < 50) {
                fuelBar.style.backgroundColor = '#ffeb3b';
                fuelBar.style.boxShadow = '0 0 15px #ffeb3b';
            } else {
                fuelBar.style.backgroundColor = '#00ffcc';
                fuelBar.style.boxShadow = '0 0 15px #00ffcc';
            }

            // Distance & Score
            let dist = Math.floor(car.cx / 10);
            maxDistance = Math.max(maxDistance, dist);
            distanceEl.innerText = 'Distance: ' + maxDistance + 'm';
            scoreEl.innerText = 'Pickups: ' + pickupsCollected;
        }

        function loop(timestamp) {
            time = timestamp;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state === 'playing') {
                car.update(terrain);
                spawnPickups();
            }

            // Smooth Camera Follow
            let targetCamX = car.cx + canvas.width * 0.2; // Keep car left of center
            let targetCamY = car.cy - canvas.height * 0.1;
            
            cameraX += (targetCamX - cameraX) * 0.1;
            cameraY += (targetCamY - cameraY) * 0.1;

            // Optional Parallax Stars/Grid Background
            ctx.fillStyle = 'rgba(0, 255, 204, 0.05)';
            for (let i = 0; i < 50; i++) {
                let px = (cameraX * 0.2 + i * 150) % canvas.width;
                let py = (cameraY * 0.2 + (i * 73) % canvas.height) % canvas.height;
                ctx.beginPath();
                ctx.arc(px, py, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Transform View
            ctx.save();
            ctx.translate(canvas.width / 2 - cameraX, canvas.height / 2 - cameraY);

            // Draw Entities
            for (let p of pickups) {
                p.update(car);
                p.draw(ctx, time);
            }
            
            car.draw(ctx);
            terrain.draw(ctx, cameraX, canvas.width, canvas.height);

            ctx.restore();

            updateUI();

            requestAnimationFrame(loop);
        }

        // Start Game
        restartGame();
        requestAnimationFrame(loop);

    </script>
</body>
</html>
